<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dijital İkiz Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
}

.subtitle {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 30px;
}

.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    flex: 1;
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

.main {
    display: flex;
    gap: 30px;
}

.chart-container {
    width: 280px;
}

.rooms {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}

.room {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    width: 150px;
    cursor: pointer;
    transition: 0.2s;
}

.room:hover {
    background: #334155;
}

.line-chart {
    margin-top: 30px;
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    width: 600px;
    margin-left: auto;
    margin-right: auto;
}
</style>
</head>

<body>

<h1>🏫 Dijital İkiz Sistemine Hoş Geldiniz</h1>
<p class="subtitle">Enerji İzleme ve Simülasyon Paneli</p>

<!-- ÜST -->
<div class="cards">
    <div class="card">
        <h3>Toplam Enerji</h3>
        <p id="totalEnergy">0</p>
    </div>

    <div class="card">
        <h3>En Çok Tüketen Oda</h3>
        <p id="topRoom">-</p>
    </div>

    <div class="card">
        <h3>Aktif Oda Sayısı</h3>
        <p id="activeRooms">0</p>
    </div>
</div>

<!-- ORTA -->
<div class="main">
    <div class="chart-container">
        <canvas id="pieChart"></canvas>
    </div>

    <div class="rooms" id="roomCards"></div>
</div>

<!-- ALT -->
<div class="line-chart">
    <h3>Enerji Geçmişi</h3>
    <canvas id="lineChart"></canvas>
</div>

<script>

let pieChart;
let lineChart;

async function loadData() {

    let summary = await fetch('/api/summary').then(r => r.json());

    // ÜST KARTLAR
    document.getElementById("totalEnergy").innerText = summary.total_energy + " kWh";
    document.getElementById("topRoom").innerText = summary.most_used_room || "-";

    let activeCount = Object.keys(summary.room_usage).length;
    document.getElementById("activeRooms").innerText = activeCount;

    // 🔥 ARTIK BURASI summary'den geliyor
    drawPie(summary.room_usage);
    drawRooms(summary.room_usage);

    // LINE
    let history = await fetch('/api/data').then(r => r.json());
    drawLine(history);
}

function drawPie(data) {

    if (pieChart) pieChart.destroy();

    pieChart = new Chart(document.getElementById("pieChart"), {
        type: 'pie',
        data: {
            labels: Object.keys(data),
            datasets: [{
                data: Object.values(data),
                backgroundColor: [
                    '#3b82f6','#22c55e','#f59e0b','#ef4444','#a855f7'
                ]
            }]
        },
        options: {
            plugins: {
                legend: {
                    labels: { color: "white" }
                }
            }
        }
    });
}

function drawRooms(data) {
    let container = document.getElementById("roomCards");
    container.innerHTML = "";

    for (let room in data) {

        let div = document.createElement("div");
        div.className = "room";

        div.innerHTML = `
            <h4>${room}</h4>
            <p>${data[room]} kWh</p>
        `;

        // 🔥 TIKLANABİLİR
        div.onclick = () => openRoom(room);

        container.appendChild(div);
    }
}

function drawLine(history) {

    if (lineChart) lineChart.destroy();

    let energyData = history.filter(x => x.type === "energy");

    let rooms = [...new Set(energyData.map(x => x.room))];
    let labels = [...new Set(energyData.map(x => x.timestamp))];

    labels.sort((a, b) => new Date(a) - new Date(b));

    let datasets = [];

    rooms.forEach((room, index) => {

        let data = [];

        labels.forEach(time => {
            let record = energyData.find(x => x.room === room && x.timestamp === time);
            data.push(record ? record.value : null);
        });

        let colors = ['#3b82f6','#ef4444','#22c55e','#f59e0b','#a855f7'];

        datasets.push({
            label: room,
            data: data,
            borderColor: colors[index % colors.length],
            fill: false,
            tension: 0.3,
            spanGaps: true
        });
    });

    lineChart = new Chart(document.getElementById("lineChart"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: datasets
        }
    });
}

function openRoom(room) {
    window.location.href = `/room?room=${room}`;
}

loadData();
setInterval(loadData, 15000);

</script>

</body>
</html>
