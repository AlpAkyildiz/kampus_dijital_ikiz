<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dijital İkiz Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
}

.subtitle {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 30px;
}

.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    flex: 1;
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

.main {
    display: flex;
    gap: 30px;
}

.chart-container {
    width: 280px;
}

.rooms {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}

.room {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    width: 150px;
    cursor: pointer;
    transition: 0.2s;
}

.room button {
    margin-top: 10px;
    cursor: pointer;
}


.room:hover {
    background: #334155;
    transform: scale(1.05);
}

.line-chart {
    margin-top: 30px;
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    width: 600px;
    margin-left: auto;
    margin-right: auto;
}
</style>
</head>

<body>

<h1>🏫 Dijital İkiz Sistemine Hoş Geldiniz</h1>
<div style="text-align:center; margin-bottom:20px;">
    <button onclick="addRoomUI()">➕ Yeni Oda</button>
</div>

<p class="subtitle">Enerji İzleme ve Simülasyon Paneli</p>

<!-- ÜST -->
<div class="cards">
    <div class="card">
        <h3>Toplam Enerji</h3>
        <p id="totalEnergy">0</p>
    </div>

    <div class="card">
        <h3>En Çok Tüketen Oda</h3>
        <p id="topRoom">-</p>
    </div>

    <div class="card">
        <h3>Aktif Oda Sayısı</h3>
        <p id="activeRooms">0</p>
    </div>
    
</div>



<!-- ORTA -->
<div class="main">
    <div class="chart-container">
        <canvas id="pieChart"></canvas>
    </div>

    <div class="rooms" id="roomCards"></div>
</div>

<!-- ALT -->
<div class="line-chart">
    <h3>Enerji Geçmişi</h3>
    <div style="height:300px;">
    <canvas id="lineChart"></canvas>
</div>

</div>

<script>

let pieChart;
let lineChart;

async function loadData() {

    let summary = await fetch('/api/summary').then(r => r.json());

    // ÜST KARTLAR
    document.getElementById("totalEnergy").innerText = summary.total_energy + " kWh";
    document.getElementById("topRoom").innerText = summary.most_used_room || "-";

    let activeCount = Object.keys(summary.room_usage).length;
    document.getElementById("activeRooms").innerText = activeCount;

    // 🔥 ARTIK BURASI summary'den geliyor
    drawPie(summary.room_usage);
    drawRooms(summary.room_usage);

    // LINE
    let history = await fetch('/api/data').then(r => r.json());
    drawLine(history);
}

function addRoomUI() {

    let room = prompt("Oda adı gir:");

    if (!room) return;

    let devices = [];

    if (confirm("Işık eklensin mi?")) {
        devices.push({ name: "light", power: 0.5 });
    }

    if (confirm("Projeksiyon eklensin mi?")) {
        devices.push({ name: "projector", power: 1.2 });
    }

    if (confirm("Bilgisayarlar eklensin mi?")) {
        devices.push({ name: "computers", power: 3.5 });
    }

    if (confirm("Prizler eklensin mi?")) {
        devices.push({ name: "sockets", power: 2.0 });
    }

    fetch('/api/add-room', {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            room: room,
            devices: devices
        })
    })
    .then(() => {
        alert("Oda eklendi!");
        loadData(); // 🔥 dashboard refresh
    });
}


function drawPie(data) {

    if (pieChart) pieChart.destroy();

    pieChart = new Chart(document.getElementById("pieChart"), {
        type: 'pie',
        data: {
            labels: Object.keys(data),
            datasets: [{
                data: Object.values(data),
                backgroundColor: [
                    '#3b82f6','#22c55e','#f59e0b','#ef4444','#a855f7'
                ]
            }]
        },
        options: {
            plugins: {
                legend: {
                    labels: { color: "white" }
                }
            }
        }
    });
}

function drawRooms(data) {
    let container = document.getElementById("roomCards");
    container.innerHTML = "";

    for (let room in data) {
        let div = document.createElement("div");
        div.className = "room";

        div.innerHTML = `
            <h4 onclick="openRoom('${room}')">${room}</h4>
            <p>${data[room]} kWh</p>
            <button onclick="deleteRoom('${room}')">🗑 Sil</button>
        `;

        container.appendChild(div);
    }
}

function deleteRoom(room) {

    if (!confirm(room + " silinsin mi?")) return;

    fetch('/api/delete-room', {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ room: room })
    })
    .then(() => {
        alert("Silindi");
        loadData(); // 🔥 refresh
    });
}



function drawLine(history) {

    if (lineChart) lineChart.destroy();

    let rooms = [...new Set(history.map(x => x.room))];
    let labels = [...new Set(history.map(x => x.timestamp))];

    labels.sort((a, b) => new Date(a) - new Date(b));

    let datasets = [];

    rooms.forEach((room, index) => {

        let data = labels.map(time => {
            let records = history.filter(x => x.room === room && x.timestamp === time);
            return records.length ? records.reduce((sum, r) => sum + r.value, 0) : 0;
        });

        let colors = ['#3b82f6','#ef4444','#22c55e','#f59e0b','#a855f7'];

        datasets.push({
            label: room,
            data: data,
            borderColor: colors[index % colors.length],
            fill: false,
            tension: 0.3
        });
    });

    lineChart = new Chart(document.getElementById("lineChart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: datasets
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});

}


async function addRoom() {

    let room = prompt("Oda adı gir (örn: lab_405)");

    if (!room) return;

    await fetch('/api/add-room', {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ room })
    });

    loadData(); // 🔥 hemen yenile
}



function openRoom(room) {
    window.location.href = `/room?room=${room}`;
}

loadData();
setInterval(loadData, 3000);

</script>

</body>
</html>
