<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dijital İkiz Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    padding:20px;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

h1{
    text-align:center;
}

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    margin-top:30px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

.value{
    font-size:28px;
    font-weight:bold;
    margin-top:10px;
}

.alarm-on{
    color:#ef4444;
}

.alarm-off{
    color:#22c55e;
}

.chart-box{
    margin-top:30px;
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#94a3b8;
}
</style>
</head>

<body>

<h1>🏫 Dijital İkiz Dashboard</h1>

<div class="cards">

<div class="card">
<h3>🌡️ Sıcaklık</h3>
<div class="value" id="temp">0 °C</div>
</div>

<div class="card">
<h3>💧 Nem</h3>
<div class="value" id="hum">0 %</div>
</div>

<div class="card">
<h3>🔥 Gaz</h3>
<div class="value" id="gas">0</div>
</div>

<div class="card">
<h3>🚨 Alarm</h3>
<div class="value" id="alarm">Normal</div>
</div>

</div>

<div class="chart-box">
<h3>Son Veriler</h3>
<canvas id="chart"></canvas>
</div>

<div class="footer">
Son Güncelleme: <span id="time">-</span>
</div>

<script>

let chart;

async function loadLive(){

    let res = await fetch('/api/live');
    let data = await res.json();

    if(!data) return;

    document.getElementById("temp").innerText =
        data.temperature + " °C";

    document.getElementById("hum").innerText =
        data.humidity + " %";

    document.getElementById("gas").innerText =
        data.gas;

    let alarm = document.getElementById("alarm");

    if(data.gas_alarm == true){
        alarm.innerText = "TEHLİKE";
        alarm.className = "value alarm-on";
    }else{
        alarm.innerText = "Normal";
        alarm.className = "value alarm-off";
    }

    document.getElementById("time").innerText =
        new Date(data.created_at).toLocaleString("tr-TR");
}

async function loadChart(){

    let res = await fetch('/api/history');
    let rows = await res.json();

    let labels = rows.map(x =>
        new Date(x.created_at).toLocaleTimeString("tr-TR")
    );

    let temps = rows.map(x => x.temperature);
    let hums = rows.map(x => x.humidity);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
        type:'line',
        data:{
            labels:labels,
            datasets:[
                {
                    label:'Sıcaklık',
                    data:temps,
                    borderColor:'#ef4444',
                    tension:0.3
                },
                {
                    label:'Nem',
                    data:hums,
                    borderColor:'#3b82f6',
                    tension:0.3
                }
            ]
        },
        options:{
            plugins:{
                legend:{
                    labels:{color:'white'}
                }
            },
            scales:{
                x:{
                    ticks:{color:'white'}
                },
                y:{
                    ticks:{color:'white'}
                }
            }
        }
    });
}

async function refresh(){
    await loadLive();
    await loadChart();
}

refresh();
setInterval(refresh,3000);

</script>

</body>
</html>
