<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kampüs Enerji Paneli</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            color: white;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 36px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
            backdrop-filter: blur(8px);
        }

        .value-label {
            font-size: 20px;
            margin-bottom: 10px;
            color: #cbd5e1;
        }

        .value {
            font-size: 42px;
            font-weight: bold;
            color: #38bdf8;
        }

        .chart-title {
            font-size: 22px;
            margin-bottom: 20px;
            color: #e2e8f0;
        }

        canvas {
            background: white;
            border-radius: 15px;
            padding: 10px;
        }

        @media (max-width: 900px) {
            .cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Kampüs Enerji Paneli</h1>

        <div class="cards">
            <div class="card">
                <div class="value-label">Sıcaklık</div>
                <div class="value"><span id="temperature">--</span> °C</div>
            </div>

            <div class="card">
                <div class="value-label">Nem</div>
                <div class="value"><span id="humidity">--</span> %</div>
            </div>

            <div class="card">
                <div class="value-label">Işık</div>
                <div class="value"><span id="light">--</span> lx</div>
            </div>
        </div>

        <div class="card">
            <div class="chart-title">Sıcaklık Grafiği</div>
            <canvas id="chart" height="120"></canvas>
        </div>
    </div>

    <script>
        let chart;
        let temperatureList = [];

        function loadData() {
            fetch("/api/data")
                .then(response => response.json())
                .then(data => {
                    document.getElementById("temperature").innerText = data.temperature;
                    document.getElementById("humidity").innerText = data.humidity;
                    document.getElementById("light").innerText = data.light;

                    temperatureList.push(data.temperature);

                    if (temperatureList.length > 10) {
                        temperatureList.shift();
                    }

                    updateChart();
                })
                .catch(error => {
                    console.log("Hata:", error);
                });
        }

        function updateChart() {
            const ctx = document.getElementById("chart").getContext("2d");

            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: "line",
                data: {
                    labels: temperatureList.map((_, i) => "Veri " + (i + 1)),
                    datasets: [{
                        label: "Sıcaklık",
                        data: temperatureList,
                        borderColor: "#0ea5e9",
                        backgroundColor: "rgba(14, 165, 233, 0.2)",
                        fill: true,
                        tension: 0.3,
                        borderWidth: 3,
                        pointBackgroundColor: "#0284c7"
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: {
                                color: "black"
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: "black"
                            }
                        },
                        y: {
                            ticks: {
                                color: "black"
                            }
                        }
                    }
                }
            });
        }

        loadData();
        setInterval(loadData, 3000);
    </script>
</body>
</html>
